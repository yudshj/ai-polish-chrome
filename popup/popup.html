<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      padding: 16px;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header-logo {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #6C63FF, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      flex: 1;
      margin: 0;
    }
    .gear-btn {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      border: none;
      border-radius: 8px;
      background: #f0f0f2;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      padding: 0;
    }
    .gear-btn:hover {
      background: #e4e4e8;
    }
    .gear-btn svg {
      width: 18px;
      height: 18px;
    }
    .status-card {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #666;
    }
    .status-row + .status-row { margin-top: 6px; }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .badge-ok { background: #e8f5e9; color: #2e7d32; }
    .badge-warn { background: #fff3e0; color: #e65100; }
    .settings-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #6C63FF, #8B5CF6);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .settings-btn:hover { opacity: 0.9; }
    .skip-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f8f9fa;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .skip-host {
      font-size: 12px;
      color: #666;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      margin-right: 8px;
    }
    .skip-toggle {
      padding: 5px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      color: #555;
    }
    .skip-toggle:hover {
      border-color: #6C63FF;
      background: #f0edff;
      color: #6C63FF;
    }
    .skip-toggle.skipped {
      background: #fff3e0;
      color: #e65100;
      border-color: #ffcc80;
    }
    .skip-toggle.skipped:hover {
      background: #e8f5e9;
      color: #2e7d32;
      border-color: #a5d6a7;
    }
    .perm-banner {
      background: linear-gradient(135deg, #fff7ed, #fef3c7);
      border: 1px solid #fbbf24;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      display: none;
    }
    .perm-banner p {
      font-size: 12px;
      color: #92400e;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .perm-btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: #f59e0b;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .perm-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="header">
    <svg class="header-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <defs>
        <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#6C63FF"/>
          <stop offset="100%" stop-color="#8B5CF6"/>
        </linearGradient>
      </defs>
      <path fill="url(#g)" d="M50 8 L56 36 Q58 42 64 44 L92 50 L64 56 Q58 58 56 64 L50 92 L44 64 Q42 58 36 56 L8 50 L36 44 Q42 42 44 36 Z"/>
      <circle fill="url(#g)" cx="76" cy="20" r="5"/>
      <circle fill="url(#g)" cx="24" cy="76" r="3.5"/>
    </svg>
    <h1>AI Polish</h1>
    <button class="gear-btn" id="settingsIcon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div class="perm-banner" id="permBanner">
    <p id="permText"></p>
    <button class="perm-btn" id="permBtn"></button>
  </div>

  <div class="status-card">
    <div class="status-row">
      <span id="labelApiKey"></span>
      <span id="keyStatus" class="badge badge-warn"></span>
    </div>
    <div class="status-row">
      <span id="labelModel"></span>
      <span id="modelName" style="font-weight:600">—</span>
    </div>
    <div class="status-row">
      <span id="labelApiUrl"></span>
      <span id="apiUrl" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="">—</span>
    </div>
  </div>

  <div class="skip-row" id="skipRow" style="display:none">
    <span class="skip-host" id="skipHost"></span>
    <button class="skip-toggle" id="skipToggle"></button>
  </div>

  <button class="settings-btn" id="openSettings"></button>

  <script src="popup.js"></script>
</body>
</html>
